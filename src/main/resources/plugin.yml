name: AppleBridge
version: 1.0.0
main: dev.applebridge.AppleBridgePlugin
api-version: '${plugin.api.version}'
authors: [SORFIN]
description: HTTP API for executing Minecraft server commands

commands:
  applebridge:
    description: Manage the AppleBridge API
    usage: /applebridge <reload|status>
    permission: applebridge.admin

permissions:
  applebridge.admin:
    description: Access to AppleBridge management commands
    default: op
